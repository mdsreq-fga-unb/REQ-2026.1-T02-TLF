services:
  postgres:
    image: postgres:16-alpine
    container_name: tlt-finance-db
    restart: unless-stopped
    env_file:
      - ./env/.env
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
