site_name: TLT Finanças
site_description: Documentação do Projeto TLT Finanças
site_author: Grupo 3 - Tengo Lengo Tengo

theme:
  name: material
  language: pt
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: red
      accent: deep-orange
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: red
      accent: deep-orange
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

plugins:
  - search

nav:
  - Home: index.md

