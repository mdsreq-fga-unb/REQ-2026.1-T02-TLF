site_name: TLT Finanças
site_description: Documentação do Projeto TLT Finanças
site_author: Grupo 3 - Tengo Lengo Tengo
site_url: https://mdsreq-fga-unb.github.io/REQ-2026.1-T02-TLF/

theme:
  name: material
  language: pt
  logo: images/tlt-icon.png
  favicon: images/tlt-icon.png
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.expand
    - navigation.path
    - navigation.footer.prev_next
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: red
      accent: deep-orange
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: red
      accent: deep-orange
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

plugins:
  - search

nav:
  - Início: index.md
  - Visão do Produto e Projeto:
      - 1-Cenário: visao/1-cenario.md
      - 2-Solução: visao/2-solucao.md
      - 3-Estratégias: visao/3-estrategias.md
      - 4-Engenharia de Requisitos: visao/4-engenharia-requisitos.md
      - 5-Cronograma: visao/5-cronograma.md
      - 6-Interação entre equipe e cliente: visao/6-interacao-equipe.md
      - 7-Requisitos de Software: visao/7-requisitos-software.md
      - 8-Casos de Uso: visao/8-casosdeuso/index.md
      - 9-MoSCoW: visao/9-MoSCoW.md
      - 10-DoR e DoD: visao/10-DoR-e-DoD.md
      - 11-WIL do Produto: visao/11-WIL-produto.md
      - 12.1-Unidade 1: visao/12-unidade-1.md
      - 12.2-Unidade 2: visao/12-unidade-2.md
      - 12.3-Unidade 3: visao/12-unidade-3.md
      - Referências: visao/referencias.md
  - Evidencias:
      - 1-Reuniões: entregas/reunioes.md
      - 2-Coverage: entregas/Cobertura.md
      - 3-Prototipo: entregas/prototipo.md
  - Apresentações: entregas/apresentacao.md

      
